services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mmo_user
      POSTGRES_PASSWORD: mmo_pass
      POSTGRES_DB: mmo_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mmo_user -d mmo_db"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

volumes:
  postgres_data:
  redis_data: